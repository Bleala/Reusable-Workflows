---
name: Reusable - Draft Release Notes 📝🎉
run-name: Draft Release Notes 📝🎉

on:
  workflow_call:
    secrets:
      GITHUB_WORKFLOW_TOKEN:
        description: 'The GITHUB_TOKEN for authentication.'
        required: true

jobs:
  draft-release-notes:
    name: Draft Release Notes 📝🎉
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    permissions:
      # write permission is required to create a github release
      contents: write
      # write permission is required for autolabeler
      # otherwise, read permission is required at least
      pull-requests: write
    steps:
      # Drafts your next Release notes as Pull Requests are merged
      # https://github.com/marketplace/actions/release-drafter

      - name: Autolabel Pull Requests 🏷️
        if: github.event_name == 'pull_request'
        id: autolabeler
        uses: release-drafter/release-drafter/autolabeler@c2e2804cc59f45f57076a99af580d0fedb697927 # v7.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_WORKFLOW_TOKEN }}

      - name: Draft Release Notes 📝🎉
        if: github.event_name == 'push'
        id: release-drafter
        uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7.3.0
        with:
          commitish: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_WORKFLOW_TOKEN }}
