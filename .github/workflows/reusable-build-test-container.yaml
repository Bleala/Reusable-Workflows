---
name: Reusable - Build Test Container 🛠️ ✅ 🐳
run-name: Build Test Container 🛠️ ✅ 🐳

on:
  workflow_call:
    inputs:
      buildcache_name:
        description: 'Name of the build cache to use'
        required: true
        type: string
      buildcache_tag:
        description: 'Tag of the build cache to use'
        required: false
        default: 'buildcache'
        type: string
      build_args:
        description: 'Build arguments to pass to the Docker build (in KEY=VALUE format, as a comma-separated list)'
        required: false
        default: ''
        type: string
      docker_context:
        description: 'Path to the Docker build context.'
        required: false
        default: './docker'
        type: string
      image_name:
        description: 'Name of the container image to build'
        required: true
        type: string
      image_tag:
        description: 'Tag for the container image to build'
        required: false
        default: 'ci-container-build'
        type: string
      platforms:
        description: 'Platforms to build for (comma-separated, e.g., linux/amd64,linux/arm64)'
        required: true
        type: string
      push:
        description: 'Whether to push the built image (true/false)'
        required: false
        default: true
        type: boolean
      ref:
        description: 'Ref to checkout'
        required: true
        type: string
      registry:
        description: 'Registry to push to'
        required: true
        type: string
      username:
        description: 'Username for the registry'
        required: true
        type: string
    secrets:
      GITHUB_WORKFLOW_TOKEN:
        description: 'The GITHUB_TOKEN for authentication.'
        required: true

jobs:
  build-test-container:
    name: Build Test Container 🛠️ ✅ 🐳
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    permissions:
      # for actions/checkout to fetch code
      contents: read
      # for docker/build-push-action to push the Container image to GitHub Container Registry
      packages: write
    steps:
      # https://github.com/marketplace/actions/checkout
      - name: Check Out Repository Code 🛒
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
          token: ${{ secrets.GITHUB_WORKFLOW_TOKEN }}

      # Determine if the image should be pushed or not
      - name: Determine Push Condition 💡
        id: push-decision
        env:
          INPUT_PUSH: ${{ inputs.push }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          # This condition checks two things:
          # 1. Was pushing requested via the 'push' input?
          # 2. Is this NOT a pull request from an external fork?
          # "do_push" is set to "true" only if both conditions are met.
          if [[ "${INPUT_PUSH}" == "true" && ("${EVENT_NAME}" != "pull_request" || "${HEAD_REPO}" == "${BASE_REPO}") ]]
          then
            echo "do_push=true" >> "$GITHUB_OUTPUT"
          else
            echo "do_push=false" >> "$GITHUB_OUTPUT"
          fi

      # Prepare build arguments, including a dynamic BUILD_DATE
      - name: Prepare Build Arguments 🛠️
        id: prepare-build-args
        run: |
          # Create dynamic timestamp for BUILD_DATE
          BUILD_DATE_VALUE="UTC-$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          # Get static build arguments from input
          STATIC_ARGS="${{ inputs.build_args }}"

          # Combine static args with dynamic BUILD_DATE, if static args exist
          if [ -n "$STATIC_ARGS" ]
          then
            # If static arguments exist, append BUILD_DATE
            echo "final_build_args=BUILD_DATE=${BUILD_DATE_VALUE},${STATIC_ARGS}" >> "$GITHUB_OUTPUT"
          # Just set BUILD_DATE if no static args exist
          else
            # If no static arguments, only set BUILD_DATE
            echo "final_build_args=BUILD_DATE=${BUILD_DATE_VALUE}" >> "$GITHUB_OUTPUT"
          fi

      # https://github.com/marketplace/actions/docker-setup-qemu
      - name: Set Up QEMU 🛠️
        id: setup-qemu
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      # https://github.com/marketplace/actions/docker-setup-buildx
      - name: Set Up Docker Buildx 🐳🧱
        id: setup-buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      # https://github.com/marketplace/actions/docker-login
      - name: Login To GitHub Container Registry 🔑📦
        id: docker-login-ghcr
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        if: ${{ steps.push-decision.outputs.do_push == 'true' }}
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.username }}
          password: ${{ secrets.GITHUB_WORKFLOW_TOKEN }}

      # https://github.com/marketplace/actions/build-and-push-docker-images
      - name: Build Docker Image For Validation And Scanning 🏗️🔬
        id: build-and-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          build-args: ${{ steps.prepare-build-args.outputs.final_build_args }}
          context: ${{ inputs.docker_context }}
          platforms: ${{ inputs.platforms }}
          push: ${{ steps.push-decision.outputs.do_push == 'true' }}
          tags: ${{ inputs.registry }}/${{ inputs.username }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
          cache-from: type=registry,ref=${{ inputs.registry }}/${{ inputs.username }}/${{ inputs.buildcache_name }}:${{ inputs.buildcache_tag }}
          cache-to: type=registry,ref=${{ inputs.registry }}/${{ inputs.username }}/${{ inputs.buildcache_name }}:${{ inputs.buildcache_tag }},mode=max
